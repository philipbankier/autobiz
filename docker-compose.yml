services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: autobiz
      POSTGRES_USER: autobiz
      POSTGRES_PASSWORD: autobiz_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autobiz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://autobiz:autobiz_dev@db:5432/autobiz
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./companies:/app/companies
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery-worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://autobiz:autobiz_dev@db:5432/autobiz
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./companies:/app/companies

  celery-beat:
    build: ./backend
    command: celery -A app.worker beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://autobiz:autobiz_dev@db:5432/autobiz
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
